# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Dr Dan Skinner
title_separator: "|"
email: dan.skinner@bristol.ac.uk
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
url: "https://drdanskinner.co.uk/" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  dtskinner
repository: dtskinner/dtskinner.github.io

lsi: false
safe: true
incremental: false
highlighter: rouge
gist:
  noscript: false
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Build settings
markdown: kramdown
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "air"
plugins:
  - jekyll-feed
  - jekyll-target-blank
  - include-cache


include: ["_pages"]
      
author:
  name: "Dan Skinner"
  avatar: "/assets/images/Headshot.png"
  bio: "Climate modeller." # Note: Markdown is allowed
  links:
    - label: "University of Bristol"
      icon: "fa-solid fa-building-columns"
    - label: "DrDanSkinner.co.uk"
      icon: "fas fa-fw fa-link"
      url: "https://DrDanSkinner.co.uk"
    - label: "dan.skinner@bristol.ac.uk"
      icon: "fa-solid fa-at"
      url: "mailto:dan.skinner@bristol.ac.uk"
    - label: "0000-0002-0086-5958"
      icon: "fa-brands fa-orcid"
      url: "https://orcid.org/0000-0002-0086-5958"
    - label: "dtskinner"
      icon : "fa-brands fa-square-github"
      url: "https://github.com/dtskinner"
  
  
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      
        
